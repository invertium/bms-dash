services:
  flutter:
    build:
      context: .
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /workspace
    volumes:
      - .:/workspace
      # Keep the debug signing keystore stable across container runs so
      # rebuilt APKs stay installable over the previous version. Gradle
      # resolves it via Java's user.home (/home/ubuntu for uid 1000), not
      # $HOME.
      - ./.android:/home/ubuntu/.android
    environment:
      HOME: /tmp
      PUB_CACHE: /workspace/.dart_tool/pub-cache
      GRADLE_USER_HOME: /workspace/.gradle
    command: flutter --version

  # Headless Android emulator for UI verification without a phone.
  # Start with: make emulator (never starts implicitly).
  emulator:
    # Pinned by digest; see the note in the Dockerfile.
    image: budtmo/docker-android:emulator_13.0@sha256:ee4c539e76131ff035ecba2ede2eda0b03ad5067905250d675bd32afb709c94f
    profiles: ["emulator"]
    devices:
      - /dev/kvm
    ports:
      - "127.0.0.1:5555:5555" # adb
      - "127.0.0.1:6080:6080" # web VNC viewer
    environment:
      EMULATOR_DEVICE: "Samsung Galaxy S10"
      WEB_VNC: "true"

  adb:
    build:
      context: .
    working_dir: /workspace
    privileged: true
    network_mode: host
    volumes:
      - .:/workspace
      - /dev/bus/usb:/dev/bus/usb
      - "${HOME}/.android:/root/.android"
    environment:
      PUB_CACHE: /workspace/.dart_tool/pub-cache
      GRADLE_USER_HOME: /workspace/.gradle
    command: adb devices
